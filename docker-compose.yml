version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: iso_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: iso_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iso_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: